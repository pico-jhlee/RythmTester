name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore RythmTester.slnx

      - name: Publish single-file exe
        run: dotnet publish RythmTester/RythmTester.csproj -c Release -o publish

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: publish/RythmTester.exe
          generate_release_notes: true
